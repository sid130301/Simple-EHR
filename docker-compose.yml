services:
  postgres:
    image: postgres:16-alpine
    container_name: healthnest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthnest_ehr
      POSTGRES_USER: healthnest
      POSTGRES_PASSWORD: healthnest_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthnest -d healthnest_ehr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
